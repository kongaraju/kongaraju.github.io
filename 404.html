<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>404 - Page Not Found | Raju Konga</title>
	<meta name="description" content="The page you're looking for doesn't exist.">
	<meta name="robots" content="noindex, nofollow">
	
	<!-- Modern fonts from Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	
	<style>
		:root {
			color-scheme: light dark;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
		}

		/* System-adaptive theme variables */
		@media (prefers-color-scheme: light) {
			:root {
				--bg-primary: 255 255 255;
				--bg-secondary: 249 250 251;
				--text-primary: 17 24 39;
				--text-secondary: 55 65 81;
				--text-tertiary: 75 85 99;
				--border-color: 229 231 235;
				--accent-color: 16 185 129;
			}
		}

		@media (prefers-color-scheme: dark) {
			:root {
				--bg-primary: 15 23 42;
				--bg-secondary: 30 41 59;
				--text-primary: 248 250 252;
				--text-secondary: 203 213 225;
				--text-tertiary: 148 163 184;
				--border-color: 51 65 85;
				--accent-color: 52 211 153;
			}
		}

		body {
			background-color: rgb(var(--bg-primary));
			color: rgb(var(--text-primary));
			line-height: 1.6;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 2rem;
		}

		.container {
			max-width: 600px;
			text-align: center;
		}

		.error-code {
			font-size: 8rem;
			font-weight: 700;
			color: rgb(var(--accent-color));
			line-height: 1;
			margin-bottom: 1rem;
		}

		h1 {
			font-size: 2rem;
			font-weight: 600;
			color: rgb(var(--text-primary));
			margin-bottom: 1rem;
		}

		p {
			font-size: 1.125rem;
			color: rgb(var(--text-secondary));
			margin-bottom: 2rem;
		}

		.links {
			display: flex;
			flex-wrap: wrap;
			gap: 1rem;
			justify-content: center;
			margin-bottom: 3rem;
		}

		.button {
			display: inline-flex;
			align-items: center;
			padding: 0.75rem 1.5rem;
			border-radius: 8px;
			text-decoration: none;
			font-weight: 600;
			font-size: 0.9rem;
			transition: opacity 0.2s;
		}

		.button:hover {
			opacity: 0.9;
		}

		.button-primary {
			background-color: rgb(var(--accent-color));
			color: rgb(var(--bg-primary));
		}

		.button-secondary {
			border: 1px solid rgb(var(--border-color));
			color: rgb(var(--text-primary));
		}

		.suggestions {
			text-align: left;
			background-color: rgb(var(--bg-secondary));
			border: 1px solid rgb(var(--border-color));
			border-radius: 8px;
			padding: 1.5rem;
		}

		.suggestions h2 {
			font-size: 1.125rem;
			font-weight: 600;
			color: rgb(var(--text-primary));
			margin-bottom: 1rem;
		}

		.suggestions ul {
			list-style: none;
			padding: 0;
		}

		.suggestions li {
			margin-bottom: 0.75rem;
		}

		.suggestions a {
			color: rgb(var(--accent-color));
			text-decoration: none;
			font-size: 0.95rem;
		}

		.suggestions a:hover {
			text-decoration: underline;
		}

		.emoji {
			font-size: 3rem;
			margin-bottom: 1rem;
			display: block;
		}

		@media (max-width: 640px) {
			.error-code {
				font-size: 5rem;
			}

			h1 {
				font-size: 1.5rem;
			}

			p {
				font-size: 1rem;
			}

			.links {
				flex-direction: column;
			}

			.button {
				width: 100%;
				justify-content: center;
			}
		}
	</style>
</head>
<body>
	<div class="container">
		<span class="emoji">🔍</span>
		<div class="error-code">404</div>
		<h1>Page Not Found</h1>
		<p>
			Sorry, the page you're looking for doesn't exist or has been moved.
			Let's get you back on track.
		</p>

		<div class="links">
			<a href="/" class="button button-primary">← Back to Home</a>
			<a href="/resume.html" class="button button-secondary">View Resume</a>
		</div>

		<div class="suggestions">
			<h2>Popular Pages</h2>
			<ul>
				<li><a href="/#about">→ About Me</a></li>
				<li><a href="/#projects">→ Selected Projects</a></li>
				<li><a href="/#experiments">→ Experiments & Open Source</a></li>
				<li><a href="/#talks">→ Talks & Presentations</a></li>
				<li><a href="/#contact">→ Contact Information</a></li>
			</ul>
		</div>
	</div>

	<script>
		// Log 404 for analytics (if GA is loaded)
		if (window.ga) {
			ga('send', 'event', 'Error', '404', window.location.pathname);
		}
	</script>
</body>
</html>
